name: EKS Terraform Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform (plan/apply/destroy)'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1   # change this to your AWS region
      TF_VERSION: 1.12.2        # change if needed

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 3: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 4: Create Terraform backend resources if they don't exist
      - name: Create S3 bucket and DynamoDB table for Terraform state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="terraform-state-${ACCOUNT_ID}-us-west-1"
          echo "BUCKET_NAME=${BUCKET_NAME}" >> $GITHUB_ENV

          # Create S3 bucket if it doesn't exist
          if ! aws s3api head-bucket --bucket "${BUCKET_NAME}" --region us-west-1 2>/dev/null; then
            echo "Creating S3 bucket: ${BUCKET_NAME}"
            aws s3api create-bucket \
              --bucket "${BUCKET_NAME}" \
              --region us-west-1 \
              --create-bucket-configuration LocationConstraint=us-west-1
            aws s3api put-bucket-versioning \
              --bucket "${BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${BUCKET_NAME}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "${BUCKET_NAME}" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            echo "S3 bucket created."
          else
            echo "S3 bucket already exists."
          fi

          # Create DynamoDB table if it doesn't exist
          if ! aws dynamodb describe-table --table-name terraform-locks --region us-west-1 2>/dev/null; then
            echo "Creating DynamoDB table for Terraform locks..."
            aws dynamodb create-table \
              --table-name terraform-locks \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region us-west-1
            aws dynamodb wait table-exists --table-name terraform-locks --region us-west-1
            echo "DynamoDB table created."
          else
            echo "DynamoDB table already exists."
          fi

      # Step 5: Terraform Init (inside eks folder)
      - name: Terraform Init
        working-directory: terraform-eks
        run: terraform init -backend-config="bucket=${BUCKET_NAME}"

      # Step 6: Terraform Validate
      - name: Terraform Validate
        working-directory: terraform-eks
        run: terraform validate

      # Step 7: Conditional Terraform Actions
      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' }}
        working-directory: terraform-eks
        env:
          TF_VAR_github_token: ${{ secrets.FLUX_GITHUB_TOKEN }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply'  }}
        working-directory: terraform-eks
        env:
          TF_VAR_github_token: ${{ secrets.FLUX_GITHUB_TOKEN }}
        run: terraform apply -auto-approve tfplan || terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: terraform-eks
        env:
          TF_VAR_github_token: ${{ secrets.FLUX_GITHUB_TOKEN }}
        run: terraform destroy -auto-approve
